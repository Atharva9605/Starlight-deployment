version: '3.8'

services:
  db:
    image: postgres:15
    container_name: starlight_pg
    environment:
      POSTGRES_USER: starlight
      POSTGRES_PASSWORD: starlight_password
      POSTGRES_DB: starlight_catalog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: starlight_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_storage:
